name: Update Citation Counts

on:
  schedule:
    - cron: "0 0 * * 1" # Runs every Monday at midnight
  workflow_dispatch: # Allows you to click "Run workflow" manually

jobs:
  update-citations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Fetch citations
        run: python3 fetch_citations.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add _data/citations.yml
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "chore: update citation counts via Semantic Scholar"
          git push
